[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "."

[dev]
  command = "npm start"
  functions = "netlify/functions"
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Form Configuration
[[forms]]
  name = "user-signup"
  honeypot = "website"
  
[[forms]]
  name = "user-login"
  honeypot = "website"

[[forms]]
  name = "contact"
  honeypot = "website"

[[forms]]
  name = "booking"
  honeypot = "website"
