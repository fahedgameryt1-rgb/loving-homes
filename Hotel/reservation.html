<div class="lang-switcher"><button onclick="setLanguage('ar')" type="button">AR</button><button onclick="setLanguage('en')" type="button">EN</button></div><a class="icon" href="javascript:void(0);" onclick="toggleNav()">☰</a>
</div>
<marquee class="m1m">☆*:. احجز إقامة لكلبك في Loving Homes بسهولة وخلينا نهتم فيه…｡.:*☆</marquee>
<div class="logo">
<img alt="شعار Loving Homes" src="img/logo.png"/>
<h1>Loving Homes</h1>
<p class="subtitle">نموذج حجز إقامة لفندق الكلاب</p>
</div>
<div class="container">
<form data-netlify="true" id="bookingForm" method="POST" name="booking" netlify-honeypot="bot-field" novalidate="">
<input name="form-name" type="hidden" value="booking"/>
<p hidden="">
<label>لا تعبئ هذا الحقل إذا كنت إنسانًا <input name="bot-field"/></label>
</p>
<h2><mark>معلومات الحجز</mark></h2>
<label for="name">اسم صاحب الحجز</label>
<input id="name" name="name" placeholder="مثال: Ahmad" type="text">
<label for="phone">رقم الهاتف</label>
<input id="phone" name="phone" placeholder="مثال: 12345678" type="text">
<label for="email">البريد الإلكتروني</label>
<input id="email" name="email" placeholder="example@gmail.com" type="text"/>
<hr/>
<h2><mark>تفاصيل الإقامة</mark></h2>
<label for="package">اختر الباقة</label>
<select id="package" name="package">
<option value="">اختر الباقة</option>
<option value="premium">الباقة المميزة</option>
<option value="classic">الباقة الكلاسيكية</option>
<option value="daily">الباقة اليومية</option>
<option value="custom">حزمة مخصصة</option>
</select>
<label for="stayDays">عدد أيام الإقامة</label>
<select id="stayDays" name="stayDays">
<option value="">اختر عدد الأيام</option>
<option value="1">ليلة</option>
<option value="2">ليلتان</option>
<option value="3">ثلاث ليال</option>
<option value="4">أربع ليال</option>
<option value="5">خمس ليال</option>
</select>
<label for="dogSize">حجم الكلب</label>
<select id="dogSize" name="dogSize">
<option value="">اختر الحجم</option>
<option value="small">صغير</option>
<option value="medium">متوسط</option>
<option value="large">كبير</option>
</select>
<label for="roomType">نوع الغرفة</label>
<select id="roomType" name="roomType">
<option value="">اختر نوع الغرفة</option>
<option value="standard">غرفة عادية</option>
<option value="comfort">غرفة مريحة</option>
<option value="private">غرفة خاصة (هدوء أكثر)</option>
</select>
<label for="checkin">تاريخ الوصول</label>
<input id="checkin" name="checkin" type="date"/>
<label for="notes">ملاحظات (حساسية، أدوية، سلوك...)</label>
<textarea id="notes" name="notes" placeholder="اكتب ملاحظاتك هنا حتى 150 حرف"></textarea>
<p class="form-message" id="formMessage"></p>
<button class="send-btn" type="submit">إرسال الحجز</button>
</input></input></form>
</div>
<div class="footer">Loving Homes - فندق الكلاب | هونغ كونغ</div>
<audio id="successSound" preload="auto" src="sound-effects/success.mp3"></audio>
<audio id="errorSound" preload="auto" src="sound-effects/error.mp3"></audio>
<script src="js/language.js"></script><script src="js/theme.js"></script>
  <script src="js/reservation.js"></script>
</body>
</html>
